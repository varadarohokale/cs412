{% extends "dadjokes/base.html" %}

{% block content %}
<h2>All Jokes</h2>

<ul>
    <!-- Loop through all jokes and display each one as a link to
             its detail page. -->
    {% for joke in jokes %}
    <li>
        <a href="{% url 'joke' joke.pk %}">{{ joke.text }}</a>
        — {{ joke.contributor }}
    </li>
    {% endfor %}
</ul>
{% endblock %}
