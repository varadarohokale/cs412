{% extends 'project/base.html' %}

{% block content %}
<h2>All Customers</h2>

<!-- Loop through this collection and display each result. -->
{% for customer in customers %}
<div class="card">
    <a href="{% url 'customer_detail' customer.pk %}">
        {{ customer.first_name }} {{ customer.last_name }}
    </a>
    <p>{{ customer.email }}</p>
</div>
<!-- Display this message when the loop has no results. -->
{% empty %}
<p>No customers found.</p>
{% endfor %}
{% endblock %}
