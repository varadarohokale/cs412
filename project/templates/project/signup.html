{% extends 'project/base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Create Account</h2>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p>
        Already have an account?
        <a href="{% url 'login' %}">Sign in here</a>
    </p>
</div>
{% endblock %}
