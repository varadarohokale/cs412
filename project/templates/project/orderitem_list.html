{% extends 'project/base.html' %}

{% block content %}
<h2>All Order Items</h2>

<!-- Loop through this collection and display each result. -->
{% for orderitem in orderitems %}
<div class="card">
    <a href="{% url 'orderitem_detail' orderitem.pk %}">
        {{ orderitem.product.name }} x {{ orderitem.quantity }}
    </a>
    <p>Order: #{{ orderitem.order.pk }}</p>
    <p>Subtotal: ${{ orderitem.subtotal }}</p>
</div>
<!-- Display this message when the loop has no results. -->
{% empty %}
<p>No order items found.</p>
{% endfor %}
{% endblock %}
