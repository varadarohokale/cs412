{% extends "mini_insta/base.html" %}

{% block content %}

<!-- Card container to visually separate the update form from the page background. -->
<div class="post-form-card">
    <h2>Update Post</h2>

    <!-- Use POST because this operation modifies data in the database.
         The generic UpdateView will process this form submission. -->
    <form method="POST">
        {% csrf_token %}
        <!-- CSRF token is required for secure POST submission in Django. -->

        <!-- Caption field: allow the user to edit the Post caption text. -->
        <div class="form-group">
            <!-- label for/id improves accessibility and click-to-focus behavior. -->
            <label for="id_caption">Caption</label>
            {{ form.caption }}
        </div>

        <!-- Action buttons: submit the update or cancel back to the Post page. -->
        <div class="form-buttons">
            <button type="submit" class="btn-primary">Update</button>

            <!-- Cancel uses a normal link because no data should be submitted. -->
            <a href="{% url 'show_post' object.pk %}" class="btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
