<!--
    File: update_profile_form.html
    Author: Varada Rohokale (vroho@bu.edu), 3/1/2026
    Description: Display a form to update an existing Profile record.
    Allows the user to edit display_name, profile_image_url, and bio_text.
    Username and join_date are intentionally not editable.
-->

{% extends "mini_insta/base.html" %}

{% block content %}

<!-- Card container to visually separate the update form from the page background. -->
<div class="post-form-card">
    <h2>Update Profile</h2>

    <!-- Use POST because this operation updates data in the database.
         The generic UpdateView will process this submission. -->
    <form method="POST">
        {% csrf_token %}
        <!-- CSRF token is required for secure POST submission in Django. -->

        <!-- Display name field: user-facing name shown on profile page. -->
        <div class="form-group">
            <!-- label for/id improves accessibility and click-to-focus behavior. -->
            <label for="id_display_name">Display name</label>
            {{ form.display_name }}
        </div>

        <!-- Profile image URL field: points to a publicly hosted image. -->
        <div class="form-group">
            <label for="id_profile_image_url">Profile image URL</label>
            {{ form.profile_image_url }}
        </div>

        <!-- Bio field: short text description displayed on profile page. -->
        <div class="form-group">
            <label for="id_bio_text">Bio</label>
            {{ form.bio_text }}
        </div>

        <!-- Action buttons: submit the update or cancel back to the Profile page. -->
        <div class="form-buttons">
            <button type="submit" class="btn-primary">
                Update
            </button>

            <!-- Cancel uses a normal link because no data should be submitted. -->
            <a href="{% url 'show_profile' object.pk %}" class="btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
